<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        College AI Assistant
    </title>

    <link
        rel="stylesheet"
        href="./css/style.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <div class="container">


        <!-- ========================= -->
        <!-- Sidebar -->
        <!-- ========================= -->

        <div class="sidebar">

            <div class="logo">

                <i class="fa-solid fa-graduation-cap"></i>

                <h2>
                    College AI
                </h2>

            </div>


            <button
                class="new-chat-btn"
                onclick="newChat()"
            >

                <i class="fa-solid fa-plus"></i>

                New Chat

            </button>


            <div class="history-title">

                Recent Chats

            </div>


            <div id="history">

                <!-- History Loads Here -->

            </div>

        </div>


        <!-- ========================= -->
        <!-- Main Area -->
        <!-- ========================= -->

        <div class="main">


            <!-- ========================= -->
            <!-- Topbar -->
            <!-- ========================= -->

            <div class="topbar">

                <div class="top-left">

                    <h1>
                        College Student Assistant
                    </h1>

                </div>


                <div class="top-right">

                    <!-- Upload Button -->

                    <div class="upload-wrapper">

                        <button
                            class="upload-btn"
                            onclick="toggleUploadMenu()"
                        >

                            <i class="fa-solid fa-upload"></i>

                            Add

                        </button>


                        <!-- Upload Dropdown -->

                        <div
                            id="uploadMenu"
                            class="upload-menu"
                        >

                            <label
                                for="pdfFile"
                                class="upload-option"
                            >

                                <i class="fa-solid fa-file-pdf"></i>

                                Upload PDF

                            </label>

                            <input
                                type="file"
                                id="pdfFile"
                                accept=".pdf"
                                hidden
                            >

                        </div>

                    </div>


                    <!-- Logout -->

                    <button
                        class="logout-btn"
                        onclick="logout()"
                    >

                        <i class="fa-solid fa-right-from-bracket"></i>

                    </button>

                </div>

            </div>


            <!-- ========================= -->
            <!-- Chat Area -->
            <!-- ========================= -->

            <div id="chat-box">

                <div class="welcome">

                    <h2>
                        Welcome to College AI Assistant
                    </h2>

                    <p>
                        Ask questions from uploaded notes,
                        assignments, PDFs, and study material.
                    </p>

                </div>

            </div>


            <!-- ========================= -->
            <!-- Input Area -->
            <!-- ========================= -->

            <div class="input-container">

                <div class="input-area">

                    <input
                        type="text"
                        id="message"
                        placeholder="Ask anything..."
                    >

                    <button onclick="sendMessage()">

                        <i class="fa-solid fa-paper-plane"></i>

                    </button>

                </div>

            </div>

        </div>

    </div>


    <!-- ========================= -->
    <!-- Script -->
    <!-- ========================= -->

    <script src="./js/config.js"></script>

    <script src="./js/app.js"></script>

    <script src="./js/dashboard.js"></script>

</body>

</html>
